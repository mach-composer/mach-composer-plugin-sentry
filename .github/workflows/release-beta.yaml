name: Create beta release

on:
  workflow_dispatch:
    inputs:
      next:
        description: 'The next increment to create the release for'
        required: true
        default: 'minor'
        type: choice
        options:
          - major
          - minor

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Set up Go
        uses: actions/setup-go@7b8cf10d4e4a01d4992d18a89f4d7dc5a3e6d6f4 # v4.3.0
        with:
          go-version-file: go.mod
          cache: false

      - name: Set up Task
        uses: arduino/setup-task@e26d8975574116b0097a1161e0fe16ba75d84c1c # v1.0.3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Get hash
        shell: bash
        run: |
          HASH=$(git rev-parse --short "$GITHUB_SHA")
          echo "HASH=$HASH" >> $GITHUB_ENV

      - name: Get the next potential version
        id: next-tag
        uses: miniscruff/changie-action@6dcc2533cac0495148ed4046c438487e4dceaa23 # v2.0.0
        with:
          version: latest
          args: next -p beta-${{ env.HASH }} ${{ github.event.inputs.next }}

      - name: Output changes
        uses: miniscruff/changie-action@6dcc2533cac0495148ed4046c438487e4dceaa23 # v2.0.0
        id: changelog
        with:
          version: latest
          args: batch --dry-run -p beta-${{ env.HASH }} ${{ github.event.inputs.next }}

      - name: Save ChangeLog to file
        id: save_changes
        run: |
          tmpfile=$(mktemp)
          echo "${STEPS_CHANGELOG_OUTPUTS_OUTPUT}" > $tmpfile
          echo  "changelog_file=$tmpfile"  >> $GITHUB_OUTPUT
        shell: bash
        env:
          STEPS_CHANGELOG_OUTPUTS_OUTPUT: ${{ steps.changelog.outputs.output }}

      - name: GoReleaser
        uses: goreleaser/goreleaser-action@5742e2a039330cbb23ebf35f046f814d4c6ff811 # v5.1.0
        with:
          args: release --clean --skip=validate --release-notes ${{ steps.save_changes.outputs.changelog_file }}
        env:
          GORELEASER_CURRENT_TAG: ${{ steps.next-tag.outputs.output }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GOPATH: ${{ env.GOPATH }}
          CHOCOLATEY_API_KEY: ${{ secrets.CHOCOLATEY_API_KEY }}
          SKIP_UPLOAD: true

      - name: Upload release
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: mach-composer-plugin-sentry
          path: dist/*
